# Deploys the static dashboard to GitHub Pages.
# NEW workflow — independent of the existing data-collection workflows.
# Rebuilds on pushes to main (so a fresh loading_times.csv from the hourly
# measurement action is picked up) and on manual dispatch.
name: Deploy Dashboard to Pages

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'loading_times.csv'
      - '.github/workflows/dashboard-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci || npm install

      - name: Build with Pages base path
        working-directory: dashboard
        # BASE_PATH must match "/<repo-name>/" for project Pages sites.
        run: BASE_PATH="/${GITHUB_REPOSITORY#*/}/" npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
